name: Build AppImage

on:
  push:
    tags:
      - 'v*'  # Se activa cuando creas un tag como v1.0.0
  workflow_dispatch:  # Permite ejecutar manualmente

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install psutil pyinstaller
    
    - name: Build executable with PyInstaller
      run: |
        pyinstaller --onefile --name sysmonitor --hidden-import=psutil sysmonitorpro.py
    
    - name: Create AppDir structure
      run: |
        mkdir -p AppDir/usr/bin
        cp dist/sysmonitor AppDir/usr/bin/
        chmod +x AppDir/usr/bin/sysmonitor
    
    - name: Create AppRun
      run: |
        cat > AppDir/AppRun << 'EOF'
        #!/bin/bash
        HERE="$(dirname "$(readlink -f "$0")")"
        exec "$HERE/usr/bin/sysmonitor" "$@"
        EOF
        chmod +x AppDir/AppRun
    
    - name: Create .desktop file
      run: |
        cat > AppDir/sysmonitorpro.desktop << 'EOF'
        [Desktop Entry]
        Name=SysMonitorPro
        Comment=Monitor de sistema avanzado para Linux
        Exec=sysmonitor
        Icon=sysmonitorpro
        Terminal=true
        Type=Application
        Categories=System;Monitor;
        EOF
    
    - name: Download appimagetool
      run: |
        wget -c "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
        chmod +x appimagetool-x86_64.AppImage
    
    - name: Build AppImage
      run: |
        ARCH=x86_64 ./appimagetool-x86_64.AppImage AppDir
    
    - name: Upload to Releases
      uses: softprops/action-gh-release@v1
      with:
        files: |
          SysMonitorPro-*.AppImage
          dist/sysmonitor
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
